<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Cat City</title>
  <link rel="stylesheet" href="style.css?v=mp-1">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="loginScreen">
    <form id="loginForm" class="login-card" action="javascript:void(0)">
      <h1>Cat City</h1>
      <label for="usernameInput">Имя игрока</label>
      <input id="usernameInput" name="username" type="text" maxlength="24" autocomplete="username" required>
      <fieldset id="characterSelect" class="character-select">
        <legend>Выбор героя</legend>
        <label class="character-option">
          <input type="radio" name="playerCharacter" value="boy" checked>
          <img src="assets/characters/player/cat_walk_down_1.png?v=sega16-v2" alt="">
          <span>Мальчик</span>
        </label>
        <label class="character-option">
          <input type="radio" name="playerCharacter" value="girl">
          <img src="assets/characters/player_girl/cat_girl_walk_down_1.png?v=sega16-v2" alt="">
          <span>Девочка</span>
        </label>
      </fieldset>
      <button type="submit">Войти в игру</button>
      <p id="loginMessage">Прогресс сохраняется локально для каждого имени.</p>
    </form>
  </div>

  <div id="ui" class="hidden">
    <span id="playerBadge"></span>
    <span id="playerStats"></span>
    <button id="questsButton">Квесты</button>
    <button id="inventoryButton">Инвентарь</button>
    <button id="equipmentButton">🗡️ Снаряжение</button>
    <button id="guideButton">Локация</button>
    <button id="tutorialButton">📖 Обучение</button>
    <button id="logoutButton">Выйти</button>

    <div id="questsPanel" class="hidden">
      <h3>Активные квесты</h3>
      <ul id="questsList"></ul>
      <button id="closeQuests">Закрыть</button>
    </div>

    <div id="inventoryPanel" class="hidden">
      <div id="invPanelHeader">
        <span class="inv-title">Инвентарь</span>
        <span id="invGoldDisplay">💰 0</span>
        <button id="closeInventory" type="button">✕</button>
      </div>
      <div id="invGrid"></div>
    </div>

    <div id="equipmentPanel" class="hidden">
      <div id="equipPanelHeader">
        <span class="equip-title">Снаряжение</span>
        <button id="closeEquipment" type="button">✕</button>
      </div>
      <div id="equipSlots"></div>
      <div id="equipHint">Надевай предметы из инвентаря</div>
    </div>

    <div id="hintE" class="hidden">Нажмите E, чтобы взаимодействовать</div>
  </div>

  <!-- Хотбар вне #ui — правый нижний угол -->
  <div id="hotbar" class="hidden">
    <div class="hb-slot" data-slot="1">
      <span class="hb-key">1</span>
      <span class="hb-icon"></span>
      <span class="hb-qty"></span>
    </div>
    <div class="hb-slot" data-slot="2">
      <span class="hb-key">2</span>
      <span class="hb-icon"></span>
      <span class="hb-qty"></span>
    </div>
    <div class="hb-slot" data-slot="3">
      <span class="hb-key">3</span>
      <span class="hb-icon"></span>
      <span class="hb-qty"></span>
    </div>
  </div>

  <div id="dialogBox" class="hidden">
    <p id="dialogText"></p>
    <button id="nextDialog">Далее</button>
  </div>

  <script type="module" src="src/core/game.js?v=mp-2"></script>
</body>
</html>
