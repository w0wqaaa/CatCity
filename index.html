<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Cat City</title>
  <link rel="stylesheet" href="style.css?v=location-guide-1">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="loginScreen">
    <form id="loginForm" class="login-card" action="javascript:void(0)">
      <h1>Cat City</h1>
      <label for="usernameInput">Имя игрока</label>
      <input id="usernameInput" name="username" type="text" maxlength="24" autocomplete="username" required>
      <fieldset id="characterSelect" class="character-select">
        <legend>Выбор героя</legend>
        <label class="character-option">
          <input type="radio" name="playerCharacter" value="boy" checked>
          <img src="assets/characters/player/cat_walk_down_1.png?v=sega16-v2" alt="">
          <span>Мальчик</span>
        </label>
        <label class="character-option">
          <input type="radio" name="playerCharacter" value="girl">
          <img src="assets/characters/player_girl/cat_girl_walk_down_1.png?v=sega16-v2" alt="">
          <span>Девочка</span>
        </label>
      </fieldset>
      <button type="submit">Войти в игру</button>
      <p id="loginMessage">Прогресс сохраняется локально для каждого имени.</p>
    </form>
  </div>

  <div id="ui" class="hidden">
    <span id="playerBadge"></span>
    <span id="playerStats"></span>
    <button id="questsButton">Квесты</button>
    <button id="inventoryButton">Инвентарь</button>
    <button id="guideButton">Локация</button>
    <button id="tutorialButton">📖 Обучение</button>
    <button id="logoutButton">Выйти</button>

    <div id="questsPanel" class="hidden">
      <h3>Активные квесты</h3>
      <ul id="questsList"></ul>
      <button id="closeQuests">Закрыть</button>
    </div>

    <div id="inventoryPanel" class="hidden">
      <h3>Инвентарь</h3>
      <ul id="inventoryList"></ul>
      <button id="closeInventory">Закрыть</button>
    </div>

    <div id="hintE" class="hidden">Нажмите E, чтобы взаимодействовать</div>
  </div>

  <div id="dialogBox" class="hidden">
    <p id="dialogText"></p>
    <button id="nextDialog">Далее</button>
  </div>

  <script type="module" src="src/core/game.js?v=location-guide-1"></script>
</body>
</html>
